<div class="admin-wrapper">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <h4 class="m-0 fw-bold">Cookbook <span class="text-success">Admin</span></h4>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-admin-link">
        <i class="fa-solid fa-chart-pie me-2"></i> Dashboard
      </a>
      <a routerLink="/admin/users" routerLinkActive="active" class="nav-admin-link">
        <i class="fa-solid fa-users me-2"></i> Usuarios
      </a>
      <a routerLink="/admin/recipes" routerLinkActive="active" class="nav-admin-link">
        <i class="fa-solid fa-utensils me-2"></i> Recetas
      </a>
      <a routerLink="/admin/comments" routerLinkActive="active" class="nav-admin-link">
        <i class="fa-solid fa-comments me-2"></i> Comentarios
      </a>
      
      <div class="mt-auto border-top pt-3">
        <a (click)="logout()" class="nav-admin-link text-danger cursor-pointer">
          <i class="fa-solid fa-right-from-bracket me-2"></i> Salir
        </a>
      </div>
    </nav>
  </aside>

  <main class="admin-main-area">
    <header class="admin-header shadow-sm bg-white p-3">
       <span class="text-muted small">Panel de Gestión v1.0</span>
    </header>

    <div class="admin-page-container">
      <router-outlet></router-outlet> 
    </div>
  </main>
</div>
