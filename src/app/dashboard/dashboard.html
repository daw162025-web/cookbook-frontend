<div class="container mt-5 pt-5">
    <div class="row">
        <div class="col-12">
            <h2 class="mb-4">Panel de Administración</h2>
            <hr>
        </div>
    </div>

    <div class="row" *ngIf="stats; else loading">
        <div class="col-md-4">
            <div class="card bg-primary text-white p-4 rounded-4 shadow-sm">
                <h3>{{ stats.total_users }}</h3>
                <p class="mb-0">Usuarios Totales</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-success text-white p-4 rounded-4 shadow-sm">
                <h3>{{ stats.total_recipes }}</h3>
                <p class="mb-0">Recetas</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-warning text-dark p-4 rounded-4 shadow-sm">
                <h3>{{ stats.pending_comments_count }}</h3>
                <p class="mb-0">Comentarios Pendientes</p>
            </div>
        </div>
        
        <div class="col-12 mt-5">
            <h4>Últimos usuarios registrados</h4>
            <ul class="list-group shadow-sm">
                <li class="list-group-item d-flex justify-content-between" *ngFor="let user of stats.latest_users">
                    <span>{{ user.name }}</span>
                    <span class="text-muted small">{{ user.email }}</span>
                </li>
            </ul>
        </div>
    </div>

    <ng-template #loading>
        <div class="text-center py-5">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-2">Obteniendo datos del servidor...</p>
        </div>
    </ng-template>
</div>
