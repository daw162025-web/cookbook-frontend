<div class="container-fluid p-4" *ngIf="stats">
  <h1 class="h3 mb-4 text-gray-800">Panel de Administración</h1>

  <div class="row">
    <div class="col-xl-3 col-md-6 mb-4">
      <div class="card border-left-primary shadow h-100 py-2">
        <div class="card-body">
          <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">Total Usuarios</div>
          <div class="h5 mb-0 font-weight-bold text-gray-800">{{ stats.total_users }}</div>
        </div>
      </div>
    </div>

    <div class="col-xl-3 col-md-6 mb-4">
      <div class="card border-left-success shadow h-100 py-2">
        <div class="card-body">
          <div class="text-xs font-weight-bold text-success text-uppercase mb-1">Recetas Publicadas</div>
          <div class="h5 mb-0 font-weight-bold text-gray-800">{{ stats.published_recipes }}</div>
        </div>
      </div>
    </div>

    <div class="col-xl-3 col-md-6 mb-4">
      <div class="card border-left-warning shadow h-100 py-2">
        <div class="card-body">
          <div class="text-xs font-weight-bold text-warning text-uppercase mb-1">Comentarios Pendientes</div>
          <div class="h5 mb-0 font-weight-bold text-gray-800">{{ stats.pending_comments_count }}</div>
        </div>
      </div>
    </div>
  </div>
</div>
