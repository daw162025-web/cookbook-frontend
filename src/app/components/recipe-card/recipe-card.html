<article class="recipe-card shadow-sm h-100 d-flex flex-column">
  <div class="position-relative overflow-hidden card-image-container">
    <img [src]="(recipe.image_url && recipe.image_url.length > 0) ? recipe.image_url[0] : 'assets/no-image.jpg'" 
         class="card-img-top" 
         [alt]="recipe.title">
    
    <button class="btn-favorite-overlay" (click)="toggleFavorite($event, recipe)">
      <i [class]="!!recipe.is_favorite ? 'fa-solid fa-heart text-danger' : 'fa-regular fa-heart text-white'"></i>
    </button>
  </div>

  <div class="card-body d-flex flex-column p-3">
    <h3 class="recipe-title h5 fw-bold">{{ recipe.title }}</h3>
    
    <div class="mt-auto">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <span class="recipe-rating small fw-bold">
          <i class="fa-solid fa-star text-warning"></i> {{ recipe.avg_rating || '0.0' }}
        </span>
        <span class="recipe-author text-muted small" *ngIf="recipe.user?.name">
          {{ recipe.user?.name }}
        </span>
      </div>
      
      <button class="btn btn-ver-mas w-100 py-2" [routerLink]="['/recipe', recipe.id]">
        Ver más
      </button>
    </div>
  </div>
</article>
