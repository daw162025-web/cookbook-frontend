<article class="recipe-card" [class.bg-light-variant]="true">
  <img [src]="recipe.image_url" [alt]="recipe.title" class="recipe-img">
  <div style="font-size: 10px; color: red; word-break: break-all;">
    URL actual: {{ recipe.image_url }}
  </div>
  <h3 class="recipe-title push-down">{{ recipe.title }}</h3>
  
  <div class="recipe-footer mt-auto">
    <div class="d-flex align-items-center gap-3">
      <span class="recipe-rating">
        <i class="fa-solid fa-star"></i> {{ recipe.avg_rating || recipe.rating || '0.0' }}
      </span>
      <span class="recipe-author" *ngIf="recipe.user?.name">
        Por: {{ recipe.user?.name }}
      </span>
    </div>
    <button class="btn btn-ver-mas mb-0 mt-0" [routerLink]="['/recipe', recipe.id]" *ngIf="recipe.id">Ver más</button>
  </div>
</article>
