<main class="container py-5">
  <div class="page-header mb-4 border border-primary rounded">
    <h1 class="page-title">Mis Favoritos</h1>
    <p class="text-muted">Las recetas que más te han gustado.</p>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-success" role="status"></div>
  </div>

  <div *ngIf="!loading && recipes.length === 0" class="text-center py-5 bg-light rounded-4">
    <i class="fa-regular fa-heart mb-3" style="font-size: 48px; color: #ddd;"></i>
    <h3>Aún no tienes favoritos</h3>
    <p>Explora recetas y pulsa el corazón para guardarlas aquí.</p>
    <button class="btn btn-brand rounded-pill mt-2" routerLink="/">Explorar recetas</button>
  </div>

  <div class="row g-4" *ngIf="!loading && recipes.length > 0">
    <div class="col-12 col-md-6 col-lg-4" *ngFor="let recipe of recipes">
      <app-recipe-card [recipe]="recipe" (favoriteToggled)="onFavoriteToggled($event)"></app-recipe-card>
    </div>
  </div>
</main>
