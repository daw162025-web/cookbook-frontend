<!-- Loading -->
<div *ngIf="loading" class="container flex-grow-1 px-4 pt-5 text-center">
  <p>Cargando receta...</p>
</div>

<!-- Error -->
<div *ngIf="error" class="container flex-grow-1 px-4 pt-5 text-center">
  <p>No se pudo cargar la receta. Inténtalo de nuevo más tarde.</p>
</div>


<main *ngIf="!loading && !error && recipe" class="container pt-5 pb-5">

    <div class="row g-5 justify-content-center">
            
        <!-- Columna Izquierda -->
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
    <div style="flex: 1; min-width: 300px;">
        <div class="mb-3 d-flex flex-wrap gap-2">
            <span *ngFor="let cat of recipe.categories" class="badge rounded-pill text-white border-0" style="background-color: #FF7B54 !important;">
                {{ cat.name }}
            </span>
        </div>
        
        <h1 class="recipe-main-title text-dark fw-bold mb-3" style="font-size: 3.5rem; line-height: 1.1;">
            {{ recipe.title }}
        </h1>
    </div>

    <div class="rating-box p-3 rounded-4 shadow-sm border text-center bg-white" style="width: 180px;">
        <p class="text-muted small mb-2 fw-bold text-uppercase" style="letter-spacing: 1px;">Tu nota</p>
        <div class="d-flex justify-content-center gap-1 mb-2">
            <i *ngFor="let s of [1,2,3,4,5]" 
               (click)="rate(s)"
               [class]="(userRating >= s) ? 'fa-solid fa-star star-active' : 'fa-regular fa-star star-empty'"
               style="cursor: pointer; font-size: 1.4rem;">
            </i>
        </div>
        <span class="badge bg-light text-dark border rounded-pill">
            {{ userRating > 0 ? '¡Gracias!' : 'Vota ahora' }}
        </span>
    </div>
</div>

        <!-- Columna Derecha-->
        <div class="col-lg-4 order-1 order-lg-2">
            <div class="sticky-top" style="top: 30px; z-index: 10;">
                
                <!-- Imagen receta -->
                <div class="recipe-image-wrapper overflow-hidden shadow-sm mb-4 position-relative" style="border-radius: 20px;">
                    <img *ngIf="images.length > 0" [src]="images[currentImageIndex]" class="w-100 object-fit-cover bg-light" style="height: 320px; transition: transform 0.5s ease;">
                    
                    <div *ngIf="images.length === 0" class="w-100 bg-light d-flex align-items-center justify-content-center text-muted" style="height: 320px;">
                        <i class="fa-regular fa-image fs-1 opacity-50"></i>
                    </div>

                    <!-- Carrusel -->
                    <button *ngIf="images.length > 1" class="img-nav-btn img-nav-left z-1" style="left: 15px;" (click)="prevImage()"><i class="fa-solid fa-chevron-left"></i></button>
                    <button *ngIf="images.length > 1" class="img-nav-btn img-nav-right z-1" style="right: 15px;" (click)="nextImage()"><i class="fa-solid fa-chevron-right"></i></button>
                    <div *ngIf="images.length > 1" class="position-absolute bottom-0 start-50 translate-middle-x mb-2 d-flex gap-2 z-1">
                        <span *ngFor="let img of images; let i = index" class="rounded-circle shadow-sm"
                              [style.width.px]="8" [style.height.px]="8"
                              [style.background-color]="i === currentImageIndex ? '#fff' : 'rgba(255,255,255,0.5)'"></span>
                    </div>
                </div>

                <!-- Caja de Ingredientes -->
                <div class="bg-white p-4 rounded-4 shadow-sm border border-light">
                    <h2 class="recipe-section-title d-flex align-items-center mb-4 fs-4">
                        <i class="fa-solid fa-basket-shopping me-2" style="color: #bdf2c3;"></i> Ingredientes</h2>
                    
                    <ul class="ingredients-list list-unstyled mb-0">
                        <li *ngFor="let ing of recipe.ingredients" class="py-3 border-bottom d-flex align-items-center">
                            <i class="fa-solid fa-check text-muted me-3" style="font-size: 0.8rem;"></i>
                            <span class="fw-bold pe-2">{{ ing.pivot?.quantity ? ing.pivot.quantity : '' }}</span> 
                            <span class="text-secondary">{{ ing.name }}</span>
                        </li>
                    </ul>
                </div>

            </div>
        </div>
        
    </div>

</main>
