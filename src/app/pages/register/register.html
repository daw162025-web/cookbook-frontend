<div class="login-page-wrapper">
    <div class="login-container">

        <div class="login-form-area">

            <div class="login-form-content">
                <h1 class="login-title" style="font-size: 28px;">¡Crea una cuenta y únete a CookBook!</h1>

                <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
                    <div class="login-form-group">
                        <label class="login-label">Nombre</label>
                        <input type="text" class="login-input" formControlName="name">
                        <div class="text-danger small mt-1" *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
                            <span *ngIf="registerForm.get('name')?.errors?.['required']">El nombre es obligatorio.</span>
                        </div>
                    </div>
                    
                    <div class="login-form-group">
                        <label class="login-label">Email</label>
                        <input type="email" class="login-input" formControlName="email">
                        <div class="text-danger small mt-1" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
                            <span *ngIf="registerForm.get('email')?.errors?.['required']">El correo es obligatorio.</span>
                            <span *ngIf="registerForm.get('email')?.errors?.['email']">Introduce un correo válido.</span>
                        </div>
                    </div>

                    <div class="login-form-group">
                        <label class="login-label">Contraseña</label>
                        <input type="password" class="login-input" formControlName="password">
                        <div class="text-danger small mt-1" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
                            <span *ngIf="registerForm.get('password')?.errors?.['required']">La contraseña es obligatoria.</span>
                            <span *ngIf="registerForm.get('password')?.errors?.['minlength']">Debe tener al menos 8 caracteres.</span>
                        </div>
                    </div>

                    <div class="login-form-group">
                        <label class="login-label">Confirmar Contraseña</label>
                        <input type="password" class="login-input" formControlName="password_confirmation">
                        <div class="text-danger small mt-1" *ngIf="registerForm.get('password_confirmation')?.invalid && registerForm.get('password_confirmation')?.touched">
                            <span *ngIf="registerForm.get('password_confirmation')?.errors?.['required']">Obligatorio confirmar.</span>
                            <span *ngIf="registerForm.get('password_confirmation')?.errors?.['passwordMismatch']">No coinciden.</span>
                        </div>
                    </div>

                    <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
                        {{ errorMessage }}
                    </div>

                    <button type="submit" class="btn-login-submit" style="background-color: #00bcd4; color: white;">Regístrate</button>
                </form>

                <p class="login-footer-text">
                    ¿Ya tienes una cuenta? <a routerLink="/login">Inicia Sesión</a>
                </p>
            </div>

        </div>

        <!-- Imagen -->
        <div class="login-image-area">
            <img src="/assets/portada.png" alt="Cooking Illustration">
        </div>

    </div>
</div>
