<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">Gestión de Usuarios</h2>
    <span class="badge bg-soft-success text-success p-2 px-3 rounded-pill">
      {{ users.length }} usuarios registrados
    </span>
  </div>

  <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light">
          <tr>
            <th class="ps-4 py-3">Usuario</th>
            <th class="py-3">Email</th>
            <th class="py-3">Rol Actual</th>
            <th class="py-3">Fecha Registro</th>
            <th class="py-3 text-end pe-4">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of users">
            <td class="ps-4">
              <div class="d-flex align-items-center gap-3">
                <img [src]="'https://ui-avatars.com/api/?name=' + user.name + '&background=bdf2c3&color=1a5928'" 
                     class="rounded-circle" width="40" height="40">
                <span class="fw-bold text-dark">{{ user.name }}</span>
              </div>
            </td>
            <td class="text-secondary">{{ user.email }}</td>
            <td>
              <span class="badge rounded-pill px-3" 
                    [ngClass]="user.role === 'admin' ? 'bg-soft-primary text-primary' : 'bg-soft-secondary text-secondary'">
                {{ user.role | uppercase }}
              </span>
            </td>
            <td class="text-muted small">{{ user.created_at | date:'mediumDate' }}</td>
            <td class="text-end pe-4">
              <button class="btn btn-sm btn-light rounded-circle me-2" (click)="openEditModal(user)" title="Editar">
                <i class="fa-solid fa-pen-to-square text-primary"></i>
              </button>
              <button *ngIf="user.id !== (authService.currentUser$ | async)?.id" 
        class="btn btn-sm btn-light rounded-circle" 
        (click)="deleteUser(user.id)" 
        title="Eliminar">
  <i class="fa-solid fa-trash text-danger"></i>
</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

    <div class="modal-backdrop" *ngIf="selectedUser">
        <div class="modal-content shadow rounded-4 p-4">
        <h4 class="fw-bold mb-3">Editar Usuario</h4>
        
        <div class="mb-3">
            <label class="form-label small fw-bold">Nombre</label>
            <input type="text" class="form-control rounded-3" [(ngModel)]="selectedUser.name">
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold">Email</label>
            <input type="email" class="form-control rounded-3" [(ngModel)]="selectedUser.email">
        </div>

      <div class="mb-4">
        <label class="form-label small fw-bold">Rol</label>
        <select class="form-select rounded-3" 
                [(ngModel)]="selectedUser.role"
                [disabled]="selectedUser.id === (authService.currentUser$ | async)?.id">
            <option value="user">Usuario (User)</option>
            <option value="admin">Administrador (Admin)</option>
        </select>
        
        <div *ngIf="selectedUser.id === (authService.currentUser$ | async)?.id" class="text-danger mt-1" style="font-size: 0.7rem;">
            No puedes cambiar tu propio rol desde aquí.
        </div>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-success rounded-pill w-100 fw-bold" (click)="saveUser()">Guardar Cambios</button>
            <button class="btn btn-light rounded-pill w-100" (click)="selectedUser = null">Cancelar</button>
        </div>
        </div>
    </div>
    </div>
